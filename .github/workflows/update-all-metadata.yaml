name: Force an update to all metadata.

on:
  workflow_dispatch:

jobs:
  # Enix: this fork only builds teleport, so the matrix is static. Upstream
  # discovers extensions dynamically via `bakery.sh list`; we don't need that.
  update-extension-metadata:
    strategy:
      matrix:
        extension: [teleport]
    runs-on: ubuntu-24.04
    permissions:
      # allow the action to create a release
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}
          path: bakery

      - name: install prerequisites
        run: |
          set -euxo pipefail

          sudo apt update -qq && sudo apt install -yqq \
            curl \
            jq

      - name: Fetch extension release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd bakery
          ./release_meta.sh ${{ matrix.extension }}

      - name: create new metadata release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: false
          tag_name: ${{ matrix.extension }}
          body_path: bakery/Release.md
          files: |
            bakery/SHA256SUMS
            bakery/*.conf

  update-global-metadata:
    needs: update-extension-metadata
    runs-on: ubuntu-24.04
    permissions:
      # allow the action to create a release
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}
          path: bakery

      - name: install prerequisites
        run: |
          set -euxo pipefail

          sudo apt update -qq && sudo apt install -yqq \
            curl \
            jq

      # Enix: upstream's `release_meta.sh` (no arg) iterates over every
      # extension declared in the repo and hits the GitHub API for each one
      # — wasteful when we only build teleport. Run it in extension mode
      # against teleport (whose SHA256SUMS already aggregates every patch),
      # then rewrite the body so the global tag still reads as global.
      - name: Fetch teleport metadata for the global tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd bakery
          ./release_meta.sh teleport
          {
            echo "# Global SHA256SUMS metadata release."
            echo ""
            echo "Updated $(date --rfc-3339 seconds)"
            echo ""
            echo "This fork only builds teleport; checksums below cover every"
            echo "teleport patch currently retained across per-major releases."
            echo ""
            sed 's:.*\s:  * :' SHA256SUMS
          } > Release.md

      - name: create new metadata release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: true
          tag_name: SHA256SUMS
          body_path: bakery/Release.md
          files: |
            bakery/SHA256SUMS
