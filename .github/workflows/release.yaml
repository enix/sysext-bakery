name: Check for new / missing upstream releases and dispatch builds

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'branch to build'
        type: string
        required: false
        default: 'main'
  schedule:
    # Each day at 5am UTC
    - cron:  '0 5 * * *'
  # Enix: run as soon as Renovate (or a manual edit) updates the tracked versions
  push:
    branches:
      - main
    paths:
      - 'release_build_versions.txt'

jobs:
  list-builds:
    runs-on: ubuntu-24.04
    outputs:
      builds: ${{ steps.list.outputs.builds }}
      extensions: ${{ steps.list.outputs.extensions }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}
          path: bakery

      - name: install prerequisites
        run: |
          set -euxo pipefail

          sudo apt update -qq && sudo apt install -yqq \
            curl \
            jq \
            squashfs-tools \
            xz-utils \
            erofs-utils

      - name: list
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd bakery
          ./release_dispatcher.sh

  create-release:
    needs: list-builds
    if: ${{ needs.list-builds.outputs.builds != '[]' && needs.list-builds.outputs.builds != '' }}
    strategy:
      matrix:
        release: ${{ fromJson(needs.list-builds.outputs.builds) }}
    # Try to finish all jobs even if one fails.
    # Job fails can be transient and will be re-tried every time this action runs.
    # NOTE that this will cause succeeding jobs (update metadata) to run even if the whole matrix fails.
    #      This is intended and should not cause any issues[tm].
    continue-on-error: true 

    runs-on: ubuntu-24.04
    permissions:
      # allow the action to create a release
      contents: write
    steps:
      - name: Set up qemu / binmft misc for cross-platform builds
        uses: docker/setup-qemu-action@v4

      - name: Check out the bakery repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}
          path: bakery

      - name: install prerequisites
        run: |
          set -euxo pipefail

          sudo apt update -qq && sudo apt install -yqq \
            curl \
            jq \
            squashfs-tools \
            xz-utils \
            erofs-utils

      - name: build
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd bakery
          ./release.sh ${{ matrix.release }}

      # Enix: publish to per-major tag (teleport-v17, teleport-v18, ...).
      # Additive: appends this patch's assets, merges SHA256SUMS lines into
      # the existing file. Retention is handled by the cleanup job below.
      - name: publish to per-major release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd bakery

          IFS=':' read -r ext ver <<< "${{ matrix.release }}"
          major="${ver%%.*}"
          tag="${ext}-${major}"

          if ! gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "$tag" \
              --notes-file Release.md \
              SHA256SUMS *.raw *.conf *-build.log
            exit 0
          fi

          # Merge existing SHA256SUMS with the new build's lines.
          mkdir -p _old
          gh release download "$tag" --repo "${GITHUB_REPOSITORY}" \
            --pattern SHA256SUMS --dir _old/ --clobber 2>/dev/null || true
          if [[ -f _old/SHA256SUMS ]]; then
            cat _old/SHA256SUMS SHA256SUMS | sort -u > SHA256SUMS.merged
            mv SHA256SUMS.merged SHA256SUMS
          fi
          rm -rf _old

          gh release edit "$tag" \
            --repo "${GITHUB_REPOSITORY}" \
            --notes-file Release.md

          gh release upload "$tag" \
            --repo "${GITHUB_REPOSITORY}" --clobber \
            SHA256SUMS *.raw *.conf *-build.log

  # Enix: trim each per-major release to keep only the KEEP most recent patches.
  # Runs unconditionally after create-release (whether it built anything or not),
  # so any drift gets corrected on every workflow trigger — including cron ticks.
  cleanup-per-major-releases:
    needs: create-release
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      KEEP: "3"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}
          path: bakery

      - name: trim old patches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd bakery

          declare -A seen
          while IFS=' ' read -r ext ver; do
            [[ -z "$ext" || -z "$ver" ]] && continue
            [[ "$ver" =~ ^(v[0-9]+)\. ]] || continue
            major="${BASH_REMATCH[1]}"
            tag="${ext}-${major}"
            [[ -n "${seen[$tag]:-}" ]] && continue
            seen[$tag]=1

            if ! gh release view "$tag" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              continue
            fi

            mapfile -t patches < <(
              gh release view "$tag" --repo "${GITHUB_REPOSITORY}" \
                --json assets --jq '.assets[].name' \
                | grep -oE "^${ext}-v[0-9]+\.[0-9]+\.[0-9]+-" \
                | sed -E "s/^${ext}-(v[0-9]+\.[0-9]+\.[0-9]+)-$/\1/" \
                | sort -uV
            )

            count=${#patches[@]}
            if [[ $count -le $KEEP ]]; then
              echo "${tag}: ${count} patches, within KEEP=${KEEP}, nothing to trim."
              continue
            fi

            drop_count=$((count - KEEP))
            to_delete=("${patches[@]:0:$drop_count}")
            echo "${tag}: dropping ${to_delete[*]}"

            pattern=""
            for del_v in "${to_delete[@]}"; do
              pattern="${pattern:+${pattern}|}${ext}-${del_v}-"
              gh release view "$tag" --repo "${GITHUB_REPOSITORY}" \
                --json assets --jq '.assets[].name' \
                | grep "^${ext}-${del_v}-" \
                | while IFS= read -r asset; do
                    gh release delete-asset "$tag" "$asset" \
                      --repo "${GITHUB_REPOSITORY}" --yes
                  done
            done

            # Drop deleted patches' lines from SHA256SUMS.
            mkdir -p _trim
            gh release download "$tag" --repo "${GITHUB_REPOSITORY}" \
              --pattern SHA256SUMS --dir _trim/ --clobber 2>/dev/null || true
            if [[ -f _trim/SHA256SUMS ]]; then
              grep -vE "  (${pattern})" _trim/SHA256SUMS > _trim/SHA256SUMS.new || true
              mv _trim/SHA256SUMS.new _trim/SHA256SUMS
              gh release upload "$tag" --repo "${GITHUB_REPOSITORY}" --clobber \
                _trim/SHA256SUMS
            fi
            rm -rf _trim
          done < <(sed -e 's:\s*#.*::' -e 's/[[:space:]]*$//' -e '/^$/d' release_build_versions.txt)

  update-extension-metadata:
    needs: [ list-builds, create-release ]
    if: ${{ needs.list-builds.outputs.extensions != '[]' && needs.list-builds.outputs.extensions != '' }}
    strategy:
      matrix:
        extension: ${{ fromJson(needs.list-builds.outputs.extensions) }}
    runs-on: ubuntu-24.04
    permissions:
      # allow the action to create a release
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}
          path: bakery

      - name: install prerequisites
        run: |
          set -euxo pipefail

          sudo apt update -qq && sudo apt install -yqq \
            curl \
            jq \
            squashfs-tools \
            xz-utils \
            erofs-utils

      - name: Fetch extension release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd bakery
          ./release_meta.sh ${{ matrix.extension }}

      - name: create new metadata release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: false
          tag_name: ${{ matrix.extension }}
          body_path: bakery/Release.md
          files: |
            bakery/SHA256SUMS
            bakery/*.conf

  update-global-metadata:
    needs: update-extension-metadata
    if: ${{ needs.list-builds.outputs.extensions != '[]' && needs.list-builds.outputs.extensions != '' }}
    runs-on: ubuntu-24.04
    permissions:
      # allow the action to create a release
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || 'main' }}
          path: bakery

      - name: install prerequisites
        run: |
          set -euxo pipefail

          sudo apt update -qq && sudo apt install -yqq \
            curl \
            jq \
            squashfs-tools \
            xz-utils \
            erofs-utils

      - name: Fetch all extension releases metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd bakery
          ./release_meta.sh

      - name: create new metadata release
        uses: softprops/action-gh-release@v3
        with:
          make_latest: true
          tag_name: SHA256SUMS
          body_path: bakery/Release.md
          files: |
            bakery/SHA256SUMS
